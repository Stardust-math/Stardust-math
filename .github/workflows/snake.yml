name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate premium contribution snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Stardust-math
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#00A8D8&color_dots=#EBEDF0,#BDEFFF,#7FDBFF,#33CFFF,#00A6D6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00E5FF&color_dots=#213547,#2B5A77,#167EA6,#00A6D6,#00D9F5

      - name: Push generated SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
