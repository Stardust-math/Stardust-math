name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate academic sapphire contribution snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Stardust-math
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#0B7285&color_dots=#F6F8FA,#D8F3FF,#A5D8FF,#4DABF7,#1864AB
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#22D3EE&color_dots=#1E293B,#334155,#2563EB,#38BDF8,#E0F2FE

      - name: Push generated SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
